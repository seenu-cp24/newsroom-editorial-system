{% extends "base.html" %}

{% block content %}

<h2>Send Article Back to SubEditor</h2>

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label class="form-label">Editor Comment</label>

<textarea name="editor_comment"
          rows="4"
          class="form-control"
          required></textarea>

</div>

<button type="submit" class="btn btn-danger">
Send Back
</button>

<a href="/editor-dashboard/" class="btn btn-secondary">
Cancel
</a>

</form>

{% endblock %}
