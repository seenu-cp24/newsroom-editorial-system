<!DOCTYPE html>
<html>

<head>
<title>Edit Article</title>
</head>

<body>

<h1>Edit Article</h1>

<form method="POST">

{% csrf_token %}

<label>Title</label><br>
<input type="text" name="title" value="{{ article.title }}"><br><br>

<label>Content</label><br>
<textarea name="content" rows="10" cols="50">{{ article.content }}</textarea><br><br>

<button type="submit">Send to Editor</button>

</form>

</body>

</html>
