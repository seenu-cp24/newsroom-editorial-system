{% extends "base.html" %}

{% block content %}

<h2>Reporter Dashboard</h2>

<a href="/create-article/" class="btn btn-primary mb-3">Create Article</a>

<table class="table table-bordered">

<tr>
<th>Title</th>
<th>Status</th>
<th>Created</th>
</tr>

{% for article in articles %}

<tr>
<td>{{ article.title }}</td>
<td>{{ article.status }}</td>
<td>{{ article.created_at }}</td>
</tr>

{% endfor %}

</table>

{% endblock %}
