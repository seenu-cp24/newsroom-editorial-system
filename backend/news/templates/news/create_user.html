{% extends "base.html" %}

{% block content %}

<h2>Create User</h2>

<div class="card p-4">

<form method="POST">

{% csrf_token %}

<div class="mb-3">
<label>Username</label>
<input type="text" name="username" class="form-control" required>
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" name="email" class="form-control">
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" name="password" class="form-control" required>
</div>

<div class="mb-3">
<label>Role</label>
<select name="role" class="form-control">

<option value="reporter">Reporter</option>
<option value="subeditor">SubEditor</option>
<option value="editor">Editor</option>
<option value="paginator">Paginator</option>

</select>
</div>

<div class="mb-3">
<label>Edition</label>
<select name="edition" class="form-control">

{% for edition in editions %}
<option value="{{ edition.id }}">{{ edition.name }}</option>
{% endfor %}

</select>
</div>

<button class="btn btn-success">
Create User
</button>

<a href="/user-control/" class="btn btn-secondary">
Cancel
</a>

</form>

</div>

{% endblock %}
