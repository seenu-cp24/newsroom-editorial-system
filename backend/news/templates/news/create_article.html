{% extends "base.html" %}

{% block content %}

<h2>Create Article</h2>

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}


<div class="mb-3">

<label class="form-label">Title</label>

<input type="text"
       name="title"
       class="form-control"
       required>

</div>

{% comment %}
<div class="mb-3">

<label class="form-label">Paste News URLs (one per line)</label>

<textarea id="news_urls"
          rows="4"
          class="form-control"></textarea>

<br>

<button type="button"
        onclick="aiGenerateFromUrls()"
        class="btn btn-dark">

AI Generate From URLs

</button>

</div>
{% endcomment %}

<div class="mb-3">

<label class="form-label">Content</label>

<textarea name="content"
          rows="8"
          class="form-control"
          required></textarea>

<br>

<button type="button" onclick="aiImprove()" class="btn btn-info">
AI Improve Article
</button>

<button type="button" onclick="aiHeadline()" class="btn btn-warning">
Generate Headline
</button>

<button type="button" onclick="aiWriteArticle()" class="btn btn-secondary">
AI Write Article
</button>

</div>


<div class="mb-3">

<label class="form-label">Category</label>

<select name="category" class="form-select">

{% for category in categories %}

<option value="{{ category.id }}">
{{ category.name }}
</option>

{% endfor %}

</select>

</div>


<h4 class="mt-4">Upload Images</h4>

<div class="mb-3">

<label class="form-label">Select Images</label>

<input type="file"
       name="images"
       multiple
       class="form-control">

</div>


<div class="mb-3">

<label class="form-label">Image Caption</label>

<input type="text"
       name="caption"
       class="form-control">

</div>


<button type="submit" class="btn btn-primary">
Submit Article
</button>


<a href="/reporter-dashboard/" class="btn btn-secondary">
Cancel
</a>

</form>

<script>

function getCookie(name) {

let cookieValue = null;

if (document.cookie && document.cookie !== '') {

const cookies = document.cookie.split(';');

for (let i = 0; i < cookies.length; i++) {

const cookie = cookies[i].trim();

if (cookie.substring(0, name.length + 1) === (name + '=')) {

cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
break;

}

}

}

return cookieValue;

}


function aiImprove(){

let content = document.querySelector("textarea[name='content']").value;

fetch("/ai-improve-article/", {

method: "POST",

headers: {
"Content-Type": "application/x-www-form-urlencoded",
"X-CSRFToken": getCookie("csrftoken")
},

body: "content=" + encodeURIComponent(content)

})
.then(res => res.json())
.then(data => {

document.querySelector("textarea[name='content']").value = data.improved_text;

});

}


function aiHeadline(){

let content = document.querySelector("textarea[name='content']").value;

fetch("/ai-generate-headline/", {

method: "POST",

headers: {
"Content-Type": "application/x-www-form-urlencoded",
"X-CSRFToken": getCookie("csrftoken")
},

body: "content=" + encodeURIComponent(content)

})
.then(res => res.json())
.then(data => {

document.querySelector("input[name='title']").value = data.headline;

});

}


function aiWriteArticle(){

let notes = document.querySelector("textarea[name='content']").value;

fetch("/ai-generate-article/", {

method: "POST",

headers: {
"Content-Type": "application/x-www-form-urlencoded",
"X-CSRFToken": getCookie("csrftoken")
},

body: "notes=" + encodeURIComponent(notes)

})
.then(res => res.json())
.then(data => {

document.querySelector("textarea[name='content']").value = data.article;

});

}

</script>

{% endblock %}
